name: Push Shorebird Patches

on:
  workflow_dispatch: # Allows manual trigger from GitHub web UI

permissions:
  contents: read

jobs:
  patch-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch isar_flutter_libs Android SDK Version
        run: |
          for file in ~/.pub-cache/hosted/pub.dev/isar_flutter_libs-*/android/build.gradle; do
            sed -i 's/compileSdkVersion 30/compileSdkVersion 34\n    namespace "dev.isar.isar_flutter_libs"/g' "$file"
            sed -i 's/minSdkVersion 16/minSdkVersion 21/g' "$file"
          done

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Patch Android
        run: shorebird patch android
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

  patch-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Git Long Paths
        run: git config --system core.longpaths true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Patch Windows
        run: shorebird patch windows
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

  patch-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Setup CocoaPods
        uses: maxim-lobanov/setup-cocoapods@v1
        with:
          version: 1.16.2

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Configure iOS Permissions
        run: |
          PLIST_PATH="ios/Runner/Info.plist"
          plutil -insert UIBackgroundModes -xml "<array><string>audio</string></array>" $PLIST_PATH || true
          plutil -replace UISupportsDocumentBrowser -bool true $PLIST_PATH || true
          plutil -replace UIFileSharingEnabled -bool true $PLIST_PATH || true

      - name: Patch iOS
        run: shorebird patch ios --no-codesign --allow-asset-diffs
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
