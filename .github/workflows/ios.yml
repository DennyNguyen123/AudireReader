name: iOS Build (Manual)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Setup CocoaPods
        uses: maxim-lobanov/setup-cocoapods@v1
        with:
          version: 1.16.2

      - name: Install dependencies
        run: flutter pub get


      - name: Patch flutter_onnxruntime Podspec
        run: |
          for file in ~/.pub-cache/hosted/pub.dev/flutter_onnxruntime-*/ios/flutter_onnxruntime.podspec; do
            sed -i '' "s/'onnxruntime-objc', '1.22.0'/'onnxruntime-objc', '1.19.2'/g" "$file"
          done

      - name: Run Code Generation (Isar Schemas)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Configure iOS Permissions (Background Audio & File Sharing)
        run: |
          PLIST_PATH="ios/Runner/Info.plist"
          plutil -insert UIBackgroundModes -xml "<array><string>audio</string></array>" $PLIST_PATH || true
          plutil -replace UISupportsDocumentBrowser -bool true $PLIST_PATH || true
          plutil -replace UIFileSharingEnabled -bool true $PLIST_PATH || true

      - name: Build iOS Application (No Codesign)
        run: flutter build ios --no-codesign --release

      - name: Package into unsigned IPA (Sideload Ready)
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r NovelReader-iOS.ipa Payload

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovelReader-iOS-IPA
          path: NovelReader-iOS.ipa
          retention-days: 7
